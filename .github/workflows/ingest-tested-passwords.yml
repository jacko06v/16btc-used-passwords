name: Ingest tested passwords

on:
  issues:
    types: [opened, edited, reopened]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: tested-passwords
  cancel-in-progress: false

jobs:
  ingest:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.issue.body || '', '### Tested passwords')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ingest submission
        id: ingest
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = "tested-passwords.txt";
            const issue = context.payload.issue;
            const body = issue?.body || "";

            function extractPasswords(text) {
              const section = text.match(/### Tested passwords([\s\S]*)/i)?.[1] || text;
              const codeBlock = section.match(/```(?:text)?\s*([\s\S]*?)```/i);
              if (!codeBlock && /### Tested passwords file/i.test(text)) {
                return [];
              }
              const source = codeBlock ? codeBlock[1] : section;
              return source
                .split(/\r?\n/)
                .map((line) => line.replace(/\r$/, ""))
                .filter((line) => line.length > 0)
                .filter((line) => !line.startsWith("Submitted from "))
                .filter((line) => !line.startsWith("### "));
            }

            function extractAttachmentUrls(text) {
              const urls = new Set();
              const regex = /https:\/\/github\.com\/user-attachments\/(?:files|assets)\/[^\s)\]]+/g;
              for (const match of text.matchAll(regex)) {
                urls.add(match[0]);
              }
              return Array.from(urls);
            }

            async function downloadAttachment(url, index) {
              const response = await fetch(url, {
                headers: {
                  "User-Agent": "16btc-used-passwords-ingest",
                  "Accept": "text/plain,application/octet-stream,*/*",
                },
              });

              if (!response.ok) {
                throw new Error(`Failed to download attachment ${index + 1}: ${response.status}`);
              }

              return await response.text();
            }

            const existingText = fs.existsSync(path) ? fs.readFileSync(path, "utf8") : "";
            const existing = new Set(
              existingText
                .split(/\r?\n/)
                .filter((line) => line.length > 0)
            );

            let submitted = extractPasswords(body);
            const attachmentUrls = extractAttachmentUrls(body);
            for (let i = 0; i < attachmentUrls.length; i += 1) {
              const attachmentText = await downloadAttachment(attachmentUrls[i], i);
              submitted = submitted.concat(
                attachmentText
                  .split(/\r?\n/)
                  .map((line) => line.replace(/\r$/, ""))
                  .filter((line) => line.length > 0)
              );
            }

            let added = 0;
            let duplicates = 0;

            for (const password of submitted) {
              if (existing.has(password)) {
                duplicates += 1;
              } else {
                existing.add(password);
                added += 1;
              }
            }

            const output = Array.from(existing).sort().join("\n") + (existing.size ? "\n" : "");
            fs.writeFileSync(path, output);

            core.setOutput("added", String(added));
            core.setOutput("duplicates", String(duplicates));
            core.setOutput("submitted", String(submitted.length));
            core.setOutput("attachments", String(attachmentUrls.length));

      - name: Commit updated denylist
        id: commit
        run: |
          if git diff --quiet -- tested-passwords.txt; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tested-passwords.txt
          git commit -m "Ingest tested password submission"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Comment and close issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const added = "${{ steps.ingest.outputs.added }}";
            const duplicates = "${{ steps.ingest.outputs.duplicates }}";
            const submitted = "${{ steps.ingest.outputs.submitted }}";
            const attachments = "${{ steps.ingest.outputs.attachments }}";
            const changed = "${{ steps.commit.outputs.changed }}";
            const body = [
              `Processed ${submitted} submitted line(s).`,
              `Attachments read: ${attachments}.`,
              `Added: ${added}.`,
              `Duplicates skipped: ${duplicates}.`,
              `File changed: ${changed}.`,
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed",
              state_reason: "completed",
            });
